<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Porsche 3D Experience</title>
<style>
  :root {
    --color-primary: #d62728;
    --color-background: #111;
    --color-accent: #f44336;
    --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  html, body {
    margin: 0;
    padding: 0;
    font-family: var(--font-family);
    background-color: var(--color-background);
    color: #fff;
    overflow: hidden;
    height: 100%;
  }

  /* UI overlays */
  #loadingScreen {
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    font-family: var(--font-family);
  }
  #loadingBarContainer {
    width: 80%;
    height: 10px;
    background: #222;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 20px;
  }
  #loadingBar {
    width: 0%;
    height: 100%;
    background: var(--color-primary);
  }
  #loadingText {
    font-size: 1.2em;
    margin-top: 10px;
  }

  /* Cinematic intro overlay */
  #cinematicOverlay {
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: #000;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:1.5em;
    z-index: 900;
    opacity:1;
    transition: opacity 1s;
  }
  #cinematicOverlay.hidden {
    opacity:0;
    pointer-events:none;
  }

  /* Top bar UI */
  #topBar {
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    display:flex;
    align-items:center;
    gap:10px;
    background: rgba(20,20,20,0.7);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--font-family);
    z-index: 500;
  }
  #topBar button {
    background: transparent;
    border: 2px solid #444;
    border-radius: 4px;
    padding: 6px 10px;
    cursor:pointer;
    font-size:0.9em;
    transition: background 0.2s;
  }
  #topBar button:hover {
    background: #333;
  }
  #fpsCounter {
    margin-left:10px;
    font-family: monospace;
  }

  /* Side controls UI */
  #sideControls {
    position: absolute;
    top:50%;
    right:10px;
    transform: translateY(-50%);
    display:flex;
    flex-direction: column;
    gap:8px;
    background: rgba(20,20,20,0.7);
    padding:8px;
    border-radius:8px;
    z-index:500;
  }
  #sideControls button {
    background: transparent;
    border: 2px solid #444;
    border-radius: 4px;
    padding: 6px 10px;
    cursor:pointer;
    font-size:0.9em;
    transition: background 0.2s;
  }
  #sideControls button:hover {
    background: #333;
  }

  /* Bottom configurator panel */
  #bottomPanel {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display:flex;
    justify-content: center;
    gap:10px;
    z-index: 500;
  }
  #configButtons {
    display:flex;
    gap:10px;
  }
  #configButtons button {
    background: rgba(20,20,20,0.7);
    border: 2px solid #444;
    border-radius: 8px;
    padding:8px 12px;
    cursor:pointer;
    font-size:0.9em;
    transition: background 0.2s;
  }
  #configButtons button:hover {
    background: #333;
  }

  /* Info panel for component info */
  #infoPanel {
    position:absolute;
    top:70px; left:50%; transform: translateX(-50%);
    max-width: 80%;
    background: rgba(20,20,20,0.95);
    padding: 16px;
    border-radius:8px;
    display:none;
    flex-direction:column;
    z-index:1000;
  }
  #infoPanel h3 {
    margin:0 0 8px 0;
    font-size:1.2em;
  }
  #infoPanel p {
    margin:4px 0;
  }
  #infoClose {
    align-self:flex-end;
    background: transparent;
    border:none;
    font-size:1.4em;
    cursor:pointer;
    color:#ccc;
    margin-top:8px;
  }

</style>
</head>
<body>
<!-- Loading screen -->
<div id="loadingScreen">
  <div style="font-size:2em;">PORSCHE IMMERSIVE EXPERIENCE</div>
  <div style="font-size:1.2em;">Created by Salonicas 2026</div>
  <div id="loadingBarContainer"><div id="loadingBar"></div></div>
</div>

<!-- Cinematic intro overlay -->
<div id="cinematicOverlay">Loading...</div>

<!-- Top UI controls -->
<div id="topBar">
  <div>Porsche Experience</div>
  <button id="fullscreenBtn">Fullscreen</button>
  <button id="muteBtn">Mute</button>
  <div id="fpsCounter">FPS: 0</div>
</div>

<!-- Side controls -->
<div id="sideControls">
  <button id="orbitBtn">Orbit</button>
  <button id="walkBtn">Walk</button>
  <button id="cockpitBtn">Cockpit</button>
  <button id="explodedBtn">Exploded</button>
  <button id="vrBtn">VR</button>
  <button id="screenshotBtn">Screenshot</button>
</div>

<!-- Bottom configurator -->
<div id="bottomPanel">
  <div id="configButtons">
    <button data-config="colors">Colors</button>
    <button data-config="wheels">Wheels</button>
    <button data-config="interior">Interior</button>
    <button data-config="environment">Environment</button>
    <button data-config="lights">Lights</button>
    <button data-config="doors">Doors</button>
  </div>
</div>

<!-- Info panel -->
<div id="infoPanel">
  <button id="infoClose">&times;</button>
  <h3 id="infoTitle"></h3>
  <p id="infoText"></p>
</div>

<!-- Three.js Canvas -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/DeviceOrientationControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/webxr/VRButton.js"></script>
<script>
(async () => {
  // =================== INITIAL SETUP ===================
  const container = document.body;
  const loadingScreen = document.getElementById('loadingScreen');
  const loadingBar = document.getElementById('loadingBar');
  const cinematicOverlay = document.getElementById('cinematicOverlay');
  const infoPanel = document.getElementById('infoPanel');
  const infoTitle = document.getElementById('infoTitle');
  const infoText = document.getElementById('infoText');
  const infoClose = document.getElementById('infoClose');

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.xr.enabled = true;
  container.appendChild(renderer.domElement);

  // Scene and Camera
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,1.5,3);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(5,10,7.5);
  directionalLight.castShadow = true;
  scene.add(directionalLight);

  // Loaders
  const loadingManager = new THREE.LoadingManager();

  let model; // placeholder for car model
  let componentsMap = {}; // map for labeled parts

  // Utility functions
  function showLoadingProgress(progress) {
    loadingBar.style.width = (progress*100).toFixed(0) + '%';
  }

  // =================== MODEL CREATION ===================
  // For the purpose of this demo, create a simplified Porsche shape
  // In real implementation, load detailed model via GLTFLoader or similar
  const carGroup = new THREE.Group();

  // Exterior body - simple shape with glossy material
  const bodyMaterial = new THREE.MeshPhysicalMaterial({
    color: 0x222222,
    metalness: 1,
    roughness: 0.1,
    clearcoat: 1,
    clearcoatRoughness: 0,
    reflectivity: 1,
    envMapIntensity:1,
  });
  const bodyGeo = new THREE.BoxGeometry(4,1.2,1.8);
  const bodyMesh = new THREE.Mesh(bodyGeo, bodyMaterial);
  bodyMesh.position.y=0.6;
  bodyMesh.name='Body';
  carGroup.add(bodyMesh);
  componentsMap['Body'] = {mesh:bodyMesh, name:'Body', info:'Main body shell', func:'Exterior shell', material:'Glossy paint'};

  // Hood
  const hoodGeo = new THREE.BoxGeometry(1.2,0.2,1.8);
  const hoodMesh = new THREE.Mesh(hoodGeo, bodyMaterial);
  hoodMesh.position.set(-1.4,1.1,0);
  hoodMesh.name='Hood';
  carGroup.add(hoodMesh);
  componentsMap['Hood'] = {mesh:hoodMesh, name:'Hood', info:'Front hood', func:'Engine access', material:'Paint'};

  // Rear
  const rearGeo = new THREE.BoxGeometry(1.2,0.2,1.8);
  const rearMesh = new THREE.Mesh(rearGeo, bodyMaterial);
  rearMesh.position.set(1.4,1.1,0);
  rearMesh.name='Rear';
  carGroup.add(rearMesh);
  componentsMap['Rear'] = {mesh:rearMesh, name:'Rear', info:'Rear hood', func:'Trunk access', material:'Paint'};

  // Windows
  const glassMaterial = new THREE.MeshPhysicalMaterial({
    color:0x555555,
    metalness:0,
    roughness:0,
    transparent:true,
    opacity:0.4,
    reflectivity:0.5,
  });
  const windowGeo = new THREE.BoxGeometry(3.8,0.8,1.7);
  const windowMesh = new THREE.Mesh(windowGeo, glassMaterial);
  windowMesh.position.set(0,1.05,0);
  windowMesh.name='Windows';
  carGroup.add(windowMesh);
  componentsMap['Windows'] = {mesh:windowMesh, name:'Windows', info:'Car windows', func:'Visibility & light', material:'Glass'};

  // Headlights
  const headlightGeo = new THREE.SphereGeometry(0.2,16,16);
  const headlightMaterial = new THREE.MeshStandardMaterial({ color:0xffffff, metalness:0.5, roughness:0.2, emissive:0xffffcc, emissiveIntensity:1 });
  const leftHeadlight = new THREE.Mesh(headlightGeo, headlightMaterial);
  leftHeadlight.position.set(-2,0.9,0.8);
  leftHeadlight.name='Headlight Left';
  scene.add(leftHeadlight);
  componentsMap['Headlight Left'] = {mesh:leftHeadlight, name:'Headlight Left', info:'Left headlight', func:'Lighting', material:'Plastic & glass'};

  const rightHeadlight = new THREE.Mesh(headlightGeo, headlightMaterial);
  rightHeadlight.position.set(-2,0.9,-0.8);
  rightHeadlight.name='Headlight Right';
  scene.add(rightHeadlight);
  componentsMap['Headlight Right'] = {mesh:rightHeadlight, name:'Headlight Right', info:'Right headlight', func:'Lighting', material:'Plastic & glass'};

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.45,0.45,0.2,32);
  const wheelMaterial = new THREE.MeshStandardMaterial({ color:0x222222, metalness:1, roughness:0.4 });
  function createWheel(x,z,rotationY) {
    const wheel = new THREE.Mesh(wheelGeo, wheelMaterial);
    wheel.rotation.z=Math.PI/2;
    wheel.rotation.y=rotationY;
    wheel.position.set(x,0.4,z);
    wheel.castShadow = true;
    scene.add(wheel);
    return wheel;
  }
  const frontLeftWheel = createWheel(-1.5,0.9,0);
  const frontRightWheel = createWheel(-1.5,-0.9,0);
  const rearLeftWheel = createWheel(1.5,0.9,0);
  const rearRightWheel = createWheel(1.5,-0.9,0);
  componentsMap['Front Left Wheel'] = {mesh:frontLeftWheel, name:'Front Left Wheel', info:'Front left tire', func:'Mobility', material:'Rubber'};
  componentsMap['Front Right Wheel'] = {mesh:frontRightWheel, name:'Front Right Wheel', info:'Front right tire', func:'Mobility', material:'Rubber'};
  componentsMap['Rear Left Wheel'] = {mesh:rearLeftWheel, name:'Rear Left Wheel', info:'Rear left tire', func:'Mobility', material:'Rubber'};
  componentsMap['Rear Right Wheel'] = {mesh:rearRightWheel, name:'Rear Right Wheel', info:'Rear right tire', func:'Mobility', material:'Rubber'};

  // Doors (simple rectangle for door)
  const doorGeo = new THREE.BoxGeometry(0.9,1.2,0.05);
  const doorMaterial = new THREE.MeshPhysicalMaterial({ color:0x222222, metalness:1, roughness:0.2 });
  const driverDoor = new THREE.Mesh(doorGeo, doorMaterial);
  driverDoor.position.set(-0.95,0.6,0.9);
  driverDoor.name='Driver Door';
  scene.add(driverDoor);
  componentsMap['Driver Door'] = {mesh:driverDoor, name:'Driver Door', info:'Left door', func:'Entry/exit', material:'Paint'};

  const passengerDoor = new THREE.Mesh(doorGeo, doorMaterial);
  passengerDoor.position.set(-0.95,0.6,-0.9);
  passengerDoor.name='Passenger Door';
  scene.add(passengerDoor);
  componentsMap['Passenger Door'] = {mesh:passengerDoor, name:'Passenger Door', info:'Right door', func:'Entry/exit', material:'Paint'};

  // Interior components
  const interiorMaterial = new THREE.MeshStandardMaterial({ color:0x000000, metalness:0.3, roughness:0.5 });
  const steeringGeo = new THREE.CylinderGeometry(0.1,0.1,0.4,16);
  const steeringWheel = new THREE.Mesh(steeringGeo, interiorMaterial);
  steeringWheel.position.set(0.5,1.2,0);
  steeringWheel.rotation.x=Math.PI/2;
  scene.add(steeringWheel);
  componentsMap['Steering Wheel'] = {mesh:steeringWheel, name:'Steering Wheel', info:'Steering control', func:'Driving', material:'Leather'};

  // Dashboard
  const dashGeo = new THREE.PlaneGeometry(1.2,0.4);
  const dashMaterial = new THREE.MeshStandardMaterial({ color:0x222222, metalness:0.2, roughness:0.4 });
  const dashboard = new THREE.Mesh(dashGeo, dashMaterial);
  dashboard.position.set(0.7,1.2,0.8);
  dashboard.rotation.x=-Math.PI/2;
  scene.add(dashboard);
  componentsMap['Dashboard'] = {mesh:dashboard, name:'Dashboard', info:'Instrument panel', func:'Display', material:'Plastic'};

  // Interior seats
  const seatGeo = new THREE.BoxGeometry(0.4,0.4,0.6);
  const seatMaterial = new THREE.MeshStandardMaterial({ color:0x000000, metalness:0.2, roughness:0.4 });
  const driverSeat = new THREE.Mesh(seatGeo, seatMaterial);
  driverSeat.position.set(0.3,0.6,0.4);
  scene.add(driverSeat);
  componentsMap['Driver Seat'] = {mesh:driverSeat, name:'Driver Seat', info:'Main driver seat', func:'Entry/exit', material:'Leather'};

  const passengerSeat = new THREE.Mesh(seatGeo, seatMaterial);
  passengerSeat.position.set(0.3,0.6,-0.4);
  scene.add(passengerSeat);
  componentsMap['Passenger Seat'] = {mesh:passengerSeat, name:'Passenger Seat', info:'Passenger seat', func:'Entry/exit', material:'Leather'};

  // =================== MODEL COMPLETE ===================

  // Group all into one object
  model = new THREE.Group();
  model.add(carGroup);
  scene.add(model);

  // Load environment maps for reflections
  const cubeTextureLoader = new THREE.CubeTextureLoader();
  const envMap = await new Promise((resolve, reject) => {
    cubeTextureLoader.load([
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/cube/skybox/px.jpg',
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/cube/skybox/nx.jpg',
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/cube/skybox/py.jpg',
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/cube/skybox/ny.jpg',
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/cube/skybox/pz.jpg',
      'https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/textures/cube/skybox/nz.jpg'
    ], resolve, reject);
  });
  scene.environment = envMap;

  // =================== CAMERAS & CONTROLS ===================
  const controls = {
    orbit: new THREE.OrbitControls(camera, renderer.domElement),
    deviceOrientation: null,
    current: 'orbit', // 'orbit', 'walk', 'cockpit', 'exploded'
  };

  // Orbit controls
  controls.orbit.enableDamping = true;
  controls.orbit.dampingFactor=0.05;
  controls.orbit.screenSpacePanning=false;
  controls.orbit.minDistance=1.5;
  controls.orbit.maxDistance=10;
  controls.orbit.target.set(0,1,0);

  // Walk controls
  let walkControls = {
    enabled:false,
    velocity: new THREE.Vector3(),
    direction: new THREE.Vector3(),
    moveForward:false,
    moveBackward:false,
    moveLeft:false,
    moveRight:false,
    canJump:false,
    gravity:9.8,
    height:1.6,
    speed:2.5,
    object: null,
    collider: new THREE.Sphere(new THREE.Vector3(), 0.5),
  };

  // VR button
  const vrButton = new THREE.VRButton(renderer);
  document.body.appendChild(vrButton.domElement);

  // =================== ANIMATION LOOP ===================
  let clock = new THREE.Clock();

  let fpsCounter = document.getElementById('fpsCounter');
  let fpsInterval = 0.5;
  let fpsAccum = 0;
  let fpsCount = 0;
  let fpsTime = 0;

  let isExploded = false;
  let explodedPositions = {};
  let explodedProgress = 0;

  let isLoadingComplete = false;

  // Load sound
  const listener = new THREE.AudioListener();
  camera.add(listener);
  const sounds = {};
  function loadSound(name, url) {
    const sound = new THREE.Audio(listener);
    return new Promise((resolve, reject)=>{
      const loader = new THREE.AudioLoader();
      loader.load(url, buffer => {
        sound.setBuffer(buffer);
        resolve(sound);
      });
    });
  }

  // Load sounds
  const soundPromises = [
    loadSound('startup', 'https://cdn.jsdelivr.net/gh/DeepAI-Models/CarSounds/startup.mp3'),
    loadSound('engineIdle', 'https://cdn.jsdelivr.net/gh/DeepAI-Models/CarSounds/engine_idle.mp3'),
    loadSound('rev', 'https://cdn.jsdelivr.net/gh/DeepAI-Models/CarSounds/rev.mp3'),
    loadSound('doorClose', 'https://cdn.jsdelivr.net/gh/DeepAI-Models/CarSounds/door_close.mp3'),
    loadSound('ambientMusic', 'https://cdn.jsdelivr.net/gh/DeepAI-Models/CarSounds/ambient.mp3')
  ];

  // For demonstration, use placeholder sounds if CDN not available
  Promise.all(soundPromises).then(([startupSound, engineIdle, revSound, doorClose, ambientMusic]) => {
    sounds.startup = startupSound;
    sounds.engineIdle = engineIdle;
    sounds.rev = revSound;
    sounds.doorClose = doorClose;
    sounds.ambientMusic = ambientMusic;
    init();
  }).catch(() => {
    // fallback to empty sounds
    sounds.startup = { play: ()=>{}, stop: ()=>{} };
    sounds.engineIdle = { play: ()=>{}, stop: ()=>{} };
    sounds.rev = { play: ()=>{}, stop: ()=>{} };
    sounds.doorClose = { play: ()=>{}, stop: ()=>{} };
    sounds.ambientMusic = { play: ()=>{}, stop: ()=>{} };
    init();
  });

  let isMuted = false;

  // =================== INITIALIZE ===================
  function init() {
    // Play startup sound
    if(sounds.startup) { sounds.startup.play(); }

    // Animate loading bar
    let loadProgress = 0;
    loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
      loadProgress = itemsLoaded / itemsTotal;
      showLoadingProgress(loadProgress);
    };

    loadingManager.onLoad = () => {
      // Finish loading
      showLoadingProgress(1);
      setTimeout(()=> {
        loadingScreen.style.display='none';
        startCinematic();
      }, 500);
    };

    // Animate the loading bar to 100%
    // (already handled via onProgress)
  }

  // =================== CINEMATIC INTRO ===================
  function startCinematic() {
    cinematicOverlay.classList.remove('hidden');
    // Animate camera over headlights, rear wing, interior
    // For demo, just delay and then fade out
    setTimeout(()=> {
      cinematicOverlay.classList.add('hidden');
      setTimeout(()=> {
        // End cinematic
        controls.current='orbit';
        animate();
      }, 1000);
    }, 3000);
  }

  // =================== EVENT HANDLERS ===================
  window.addEventListener('resize', ()=> {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  document.getElementById('fullscreenBtn').onclick= ()=> {
    if(!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  };
  document.getElementById('muteBtn').onclick= ()=> {
    isMuted = !isMuted;
    for(let key in sounds) {
      if(sounds[key].setMute) {
        sounds[key].setMute(isMuted);
      } else {
        // fallback
        if(isMuted) {
          sounds[key].pause();
        } else {
          sounds[key].play();
        }
      }
    }
  };
  document.getElementById('vrBtn').onclick= ()=> {
    if (renderer.xr.isPresenting) {
      renderer.xr.getSession().end();
    } else {
      document.body.appendChild(vrButton.domElement);
      renderer.xr.setSession( await navigator.xr.requestSession('immersive-vr') );
    }
  };
  document.getElementById('screenshotBtn').onclick= ()=> {
    renderer.domElement.toBlob(blob=> {
      const url= URL.createObjectURL(blob);
      const a= document.createElement('a');
      a.href= url;
      a.download='porsche_screenshot.png';
      a.click();
    });
  };

  // Side controls
  document.getElementById('orbitBtn').onclick= ()=> {
    controls.current='orbit';
  };
  document.getElementById('walkBtn').onclick= ()=> {
    controls.current='walk';
  };
  document.getElementById('cockpitBtn').onclick= ()=> {
    controls.current='cockpit';
  };
  document.getElementById('explodedBtn').onclick= ()=> {
    toggleExploded();
  };

  // Configurator buttons
  document.querySelectorAll('#configButtons button').forEach(btn => {
    btn.onclick= ()=> {
      const mode= btn.dataset.config;
      openConfigurator(mode);
    };
  });

  // Info panel close
  infoClose.onclick= ()=> {
    infoPanel.style.display='none';
  };

  // Mouse & touch events for interaction
  let raycaster = new THREE.Raycaster();
  let mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('click', (e)=> {
    // convert mouse coords
    mouse.x= (e.clientX / window.innerWidth)*2 -1;
    mouse.y= - (e.clientY / window.innerHeight)*2 +1;
    raycaster.setFromCamera(mouse, camera);
    const intersects= raycaster.intersectObjects(Object.values(componentsMap).map(c=>c.mesh));
    if (intersects.length>0) {
      const obj=intersects[0].object;
      showComponentInfo(obj);
    }
  });
  // For touch
  renderer.domElement.addEventListener('touchstart', (e)=> {
    const touch= e.touches[0];
    mouse.x= (touch.clientX / window.innerWidth)*2 -1;
    mouse.y= - (touch.clientY / window.innerHeight)*2 +1;
    raycaster.setFromCamera(mouse, camera);
    const intersects= raycaster.intersectObjects(Object.values(componentsMap).map(c=>c.mesh));
    if (intersects.length>0) {
      const obj=intersects[0].object;
      showComponentInfo(obj);
    }
  });

  function showComponentInfo(obj) {
    for(let key in componentsMap) {
      if (componentsMap[key].mesh===obj) {
        const data= componentsMap[key];
        document.getElementById('infoTitle').textContent= data.name;
        document.getElementById('infoText').innerHTML= `
          <b>Function:</b> ${data.func}<br/>
          <b>Material:</b> ${data.material}<br/>
          <b>Notes:</b> ${data.info}
        `;
        infoPanel.style.display='flex';
        break;
      }
    }
  }

  // =================== ANIMATE ===================
  function animate() {
    requestAnimationFrame(animate);
    const delta= clock.getDelta();

    // FPS counter
    fpsTime+=delta;
    fpsAccum+=1;
    if (fpsTime>fpsInterval) {
      fpsCount= Math.round(fpsAccum/fpsTime);
      document.getElementById('fpsCounter').textContent= 'FPS: '+fpsCount;
      fpsTime=0;
      fpsAccum=0;
    }

    // Controls update
    if (controls.current==='orbit') {
      controls.orbit.update();
    } else if (controls.current==='walk') {
      updateWalk(delta);
    } else if (controls.current==='cockpit') {
      // fixed inside
      camera.position.set(0.5,1.4,0.8);
      camera.lookAt(0.7,1.2,0);
    }

    // Exploded view
    if (isExploded) {
      explodedProgress+=delta*0.5;
      if (explodedProgress>1) explodedProgress=1;
      updateExploded(explodedProgress);
    }

    renderer.render(scene, camera);
  }

  // =================== WALK CONTROLS ===================
  function updateWalk(delta) {
    // For demo, simple WASD controls
    if (keys['KeyW']) walkControls.moveForward=true; else walkControls.moveForward=false;
    if (keys['KeyS']) walkControls.moveBackward=true; else walkControls.moveBackward=false;
    if (keys['KeyA']) walkControls.moveLeft=true; else walkControls.moveLeft=false;
    if (keys['KeyD']) walkControls.moveRight=true; else walkControls.moveRight=false;
    // movement
    walkControls.direction.set(0,0,0);
    if (walkControls.moveForward) walkControls.direction.z-=1;
    if (walkControls.moveBackward) walkControls.direction.z+=1;
    if (walkControls.moveLeft) walkControls.direction.x-=1;
    if (walkControls.moveRight) walkControls.direction.x+=1;
    walkControls.direction.normalize();
    // move camera
    const moveSpeed= walkControls.enabled ? walkControls.speed : 0;
    const dir= walkControls.direction.clone().applyEuler(new THREE.Euler(0,camera.rotation.y,0));
    camera.position.add(dir.multiplyScalar(moveSpeed*delta));
  }

  const keys= {};
  window.addEventListener('keydown', (e)=>{ keys[e.code]=true; });
  window.addEventListener('keyup', (e)=>{ keys[e.code]=false; });

  // =================== EXPLODED VIEW ===================
  function toggleExploded() {
    isExploded= !isExploded;
    if (isExploded) {
      // Save original positions
      for(let key in componentsMap) {
        explodedPositions[key]= componentsMap[key].mesh.position.clone();
      }
      // Animate outward
      explodedProgress=0;
    } else {
      // reset
      for(let key in componentsMap) {
        componentsMap[key].mesh.position.copy(explodedPositions[key]);
      }
    }
  }

  function updateExploded(progress) {
    for(let key in componentsMap) {
      const mesh= componentsMap[key].mesh;
      const originalPos= explodedPositions[key];
      // For demo, move outward along local axis
      const dir= originalPos.clone().normalize();
      mesh.position.copy(originalPos.clone().add(dir.multiplyScalar(progress*0.5)));
    }
  }

  // =================== OPEN/CLOSE DOORS ===================
  function toggleDoor(doorName) {
    const door= componentsMap[doorName];
    if (!door) return;
    const mesh= door.mesh;
    const openAngle= Math.PI/3;
    if (!mesh.userData.open) mesh.userData.open=0;
    if (mesh.userData.open===0) {
      // open
      new TWEEN.Tween(mesh.rotation)
        .to({ y: openAngle }, 1000)
        .start();
      mesh.userData.open=1;
      if(sounds.doorClose) { sounds.doorClose.play(); }
    } else {
      // close
      new TWEEN.Tween(mesh.rotation)
        .to({ y:0 }, 1000)
        .start();
      mesh.userData.open=0;
    }
  }

  // For demo, assign door toggle
  // (In full app, buttons or hotspots)
  window.toggleDoor = toggleDoor;

  // =================== OPEN/CLOSE HOOD / TRUNK ===================
  function toggleHood() {
    // Animate hood up
    const hood= componentsMap['Hood'].mesh;
    if (!hood.userData.open) hood.userData.open=0;
    if (hood.userData.open===0) {
      new TWEEN.Tween(hood.position)
        .to({ y: hood.position.y+0.3 }, 1000)
        .start();
      hood.userData.open=1;
    } else {
      new TWEEN.Tween(hood.position)
        .to({ y: hood.position.y-0.3 }, 1000)
        .start();
      hood.userData.open=0;
    }
  }
  window.toggleHood=toggleHood;

  // =================== OPEN/CLOSE WINDOWS ===================
  function toggleWindows() {
    const win= componentsMap['Windows'].mesh;
    if (!win.userData.open) win.userData.open=0;
    if (win.userData.open===0) {
      new TWEEN.Tween(win.scale)
        .to({ y:0.1 }, 1000)
        .start();
      win.userData.open=1;
    } else {
      new TWEEN.Tween(win.scale)
        .to({ y:1 }, 1000)
        .start();
      win.userData.open=0;
    }
  }
  window.toggleWindows=toggleWindows;

  // =================== OPEN/CLOSE LIGHTS ===================
  function toggleHeadlights(on) {
    if (on===undefined) on=true;
    for(let key in componentsMap) {
      if (key.startsWith('Headlight')) {
        componentsMap[key].mesh.visible=on;
      }
    }
  }
  window.toggleHeadlights=toggleHeadlights;

  // =================== SWITCH COLOR ===================
  function setColor(colorHex) {
    bodyMaterial.color.setHex(colorHex);
  }
  window.setColor=setColor;

  // =================== SWITCH WHEELS ===================
  function setWheels(type) {
    // For demo, change wheel color
    if (type==='sport') {
      frontLeftWheel.material.color.setHex(0x222222);
      frontRightWheel.material.color.setHex(0x222222);
      rearLeftWheel.material.color.setHex(0x222222);
      rearRightWheel.material.color.setHex(0x222222);
    } else if (type==='luxury') {
      frontLeftWheel.material.color.setHex(0xdddddd);
      frontRightWheel.material.color.setHex(0xdddddd);
      rearLeftWheel.material.color.setHex(0xdddddd);
      rearRightWheel.material.color.setHex(0xdddddd);
    } else {
      frontLeftWheel.material.color.setHex(0x222222);
      frontRightWheel.material.color.setHex(0x222222);
      rearLeftWheel.material.color.setHex(0x222222);
      rearRightWheel.material.color.setHex(0x222222);
    }
  }
  window.setWheels=setWheels;

  // =================== OPEN/CLOSE DOORS ===================
  function openDoor(doorName) {
    toggleDoor(doorName);
  }

  // =================== OPEN HOOD ===================
  function openHood() {
    toggleHood();
  }

  // =================== OPEN WINDOWS ===================
  function openWindows() {
    toggleWindows();
  }

  // =================== TOGGLE HEADLIGHTS ===================
  function toggleLights() {
    toggleHeadlights();
  }

  // =================== ANIMATION ===================
  // Start main loop
  function start() {
    animate();
  }

  // =================== UI BUTTONS ===================
  // For demo, assign some buttons
  window.openDriverDoor= ()=> toggleDoor('Driver Door');
  window.openPassengerDoor= ()=> toggleDoor('Passenger Door');
  window.openHood= ()=> toggleHood();
  window.openWindows= ()=> toggleWindows();
  window.toggleHeadlights= ()=> toggleHeadlights();

  // =================== RENDER & ANIMATE ===================
  // Animate loop
  function render() {
    requestAnimationFrame(render);
    TWEEN.update();

    if (renderer.xr.isPresenting) {
      // VR mode
    }

    renderer.render(scene, camera);
  }

  // Start rendering
  start();

})();
</script>
</body>
</html>
